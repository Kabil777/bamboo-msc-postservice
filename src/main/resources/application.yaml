spring:
  threads:
    virtual:
      enabled: true

  config:
    import: optional:file:.env[.properties]
  application:
    name: postService

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: ${JPA_SHOW_SQL}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        type:
          json_format_mapper: com.bamboo.postService.common.hibernate.CustomHibernateJsonFormatter

  data:
    web:
      pageable:
        max-page-size: 10
        default-page-size: 10

server:
  port: ${SERVER_PORT}
user:
  service:
    url: ${USER_SERVICE_URL}
s3:
  bucket:
    name: spring-uploads
    baseUrl: http://localhost:8443
    uploadUrl: http://localhost:9000
  credentials:
    user: ${S3_ADMIN}
    password: ${S3_PASSWORD}
